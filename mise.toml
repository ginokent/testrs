# mise (https://mise.jdx.dev/) のタスクランナー / ツール管理設定。
#
# - `mise install` で必要な cargo extension (cargo-deny 等) を一括 install
# - `mise run ci`         開発 loop 用: dirty check + fmt / clippy / doc /
#                         test / deny を並列実行 (check run は投げない)
# - `mise run ci-publish` 正式署名用:   ci 相当 + 結果を **CI と同名** の
#                         check run として PR HEAD に投影 (`gh` CLI 必須)
# - 個別 task は `mise run fmt` 等で実行可能
# - 各 task の実体は scripts/*.sh (単純な bash wrapper)
#
# rust 本体は rust-toolchain.toml (channel = "1.95") で pin されているため、
# 本ファイルの [tools] では rustc / cargo は管理しない。CI 側 (GitHub
# Actions) と整合させるための追加 cargo extension のみ列挙する。
#
# ⚠️ ci-publish の危険性 (CLAUDE.md 「危険性」セクション参照):
# 本構成では ci-publish が **CI と完全同名** の check run を投影するため、
# Branch protection の Required check を local 1 回で満たせ、CI を発火
# させずに merge できる。GitHub Actions コスト削減が一義的目的で、ローカル
# 環境差で本来 CI が落ちる check が local では緑になるリスクをユーザー責任
# として受け入れる設計。第三者 contributor が居る環境では、check 名に
# `local-ci: *` 等の prefix を付けて CI と区別するか、ci-publish を撤去
# することを検討すること。

[tools]
# CI の deny job (cargo-deny-action) と同じツール。`mise install` で自動
# install され、scripts/deny.sh から呼ばれる。
"cargo:cargo-deny" = "latest"

[tasks.fmt]
description = "cargo fmt --all -- --check"
run = "./scripts/fmt.sh"

[tasks.clippy]
description = "cargo clippy --workspace --all-targets -- -D warnings"
run = "./scripts/clippy.sh"

[tasks.doc]
description = "RUSTDOCFLAGS=-D warnings cargo doc --workspace --no-deps"
run = "./scripts/doc.sh"

[tasks.test]
description = "cargo test --workspace --all-targets + --doc"
run = "./scripts/test.sh"

[tasks.deny]
description = "cargo deny check all (license / bans / sources / advisories)"
run = "./scripts/deny.sh"

[tasks.ci]
description = "preflight + fmt / clippy / doc / test / deny を並列実行 (開発 loop 用、check run は投げない)"
run = "./scripts/ci.sh"

[tasks.ci-publish]
description = "preflight + push 済み確認 + ci 相当 + 結果を **CI と同名 check run** として PR HEAD に投影"
run = "./scripts/ci-publish.sh"

name: CI

# サードパーティー action は使用しているものすべて `action@<commit SHA> # <tag>`
# 形式で pin する。tag (`@v4` 等) のままだと提供元が tag を悪意ある commit に
# re-point した瞬間 CI が compromise される。SHA pin で解決先 commit を不変化し
# supply chain 攻撃経路を遮断する。`# <tag>` コメントは dependabot の
# github-actions ecosystem が解釈する標準形式 (`.github/dependabot.yml` で
# 有効化済み) なので、SHA は自動 bump される。
#
# ----------------------------------------------------------------
# 3rd party action allowlist (project policy)
# ----------------------------------------------------------------
# GitHub `actions/*` namespace 以外 (= 3rd party) で許容する action は以下の
# 1 個のみに限定する。これ以外の 3rd party action の導入は **一切許容しない**:
#
#   - EmbarkStudios/cargo-deny-action    license / bans / sources / advisories (deny job)
#
# CVE check も本 1 個 (`cargo deny check ... advisories`) に統合している。
# 以前は `rustsec/audit-check` で別 job を分けていたが、(1) cargo-audit
# 0.21.x が CVSS 4.0 形式の advisory (RustSec advisory DB に 2026 年以降
# 追加) を parse できない問題、(2) library workspace で commit していない
# Cargo.lock を CI 上で `cargo generate-lockfile` 経由で毎回コンパイル resolve
# するコスト、の 2 点から本 1 個に集約した。cargo-deny 0.19+ は rustsec を
# 捨てて独自 advisory parser に移行しており CVSS 4.0 を扱える。
#
# 新規に 3rd party action を導入したい場合は、まず:
#   1. 機能を `actions/*` first-party action + shell script で代替できないか
#      検討する (cf. httprs の `dtolnay/rust-toolchain` / `Swatinem/rust-cache`
#      を rustup 直叩き + `actions/cache` に置き換えた事例)
#   2. 代替不可な場合のみ、本 allowlist を更新する PR を別立てで起票し、
#      導入の必要性と supply chain リスク評価を PR 本文に明記する
# の手順を踏むこと。これは supply chain 攻撃面を最小化する project policy。
# 追加時は必ず SHA pin + dependabot 連携をセットで導入すること。
# `actions/*` (= GitHub 1st party) は本 allowlist の対象外であり、必要に応じ
# 自由に追加してよい (ただし SHA pin は同様に強制する)。
# ----------------------------------------------------------------
#
# 本 workflow は untrusted な GitHub Actions context 入力 (issue title /
# PR title / commit message 等) を一切 run: コマンドに展開しない。command
# injection 経路は無い。comment body 等の文字列を扱う場合は env: 経由で
# 渡し、`run:` 内では `${{ ... }}` 展開を避ける (gate job 参照)。

# ================================================================
# Trigger 方針
# ================================================================
# 現在の運用: **PR コメントによる手動 trigger のみ** に切り替え中。コスト
# 最適化が目的で、PR 上で以下のコメントを投稿することで CI を起動する:
#
#   - `!run ci`         → fmt / clippy / doc / test (Linux only) / msrv / deny
#   - `!run ci matrix`  → 同上、ただし test を ubuntu / macos / windows の
#                         3 OS matrix で実行
#
# コメント author が OWNER / MEMBER / COLLABORATOR のいずれかに該当する場合
# のみ gate job が通る (外部 attacker が fork から trigger するのを防ぐ)。
# 詳細は下の gate job のコメント参照。
#
# 将来の復活方針 (TODO):
# ----------------------------------------------------------------
# 将来 PR 数が増加するか、マージ前ブロッキング (PR で必須緑) が必要になった
# 時点で、以下の自動 trigger を **追加** で復活させる予定:
#
#   pull_request:
#     branches:
#       - main
#       - develop
#
# 復活手順:
#   1. 下の `on:` ブロックに `pull_request:` を追加 (issue_comment と併存可)
#   2. gate job の `if:` から `contains(..., '!run ci')` 条件を撤去し、
#      `github.event_name == 'pull_request' || (... 既存 comment 条件 ...)`
#      の形にする
#   3. checkout の `ref:` を pull_request イベント時は省略 (自動で PR HEAD)、
#      issue_comment イベント時のみ `refs/pull/N/head` を渡すよう分岐
# ================================================================

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  # issue_comment イベントから PR HEAD を checkout するため必要。
  pull-requests: read

# 同じ PR への連続 `!run ci` コメントで in-progress run を cancel する。
# `issue_comment` event の `github.ref` は default branch を指してしまい
# PR 間で衝突するため、group key は PR 番号ベースで構築する。
concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.issue.number }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # workspace で `unsafe_code = "forbid"` を強制しているが、CI ではさらに
  # rustc warning も error 化して regression を防ぐ。
  RUSTFLAGS: -D warnings

jobs:
  # ================================================================
  # gate: comment trigger の許可判定 + PR ref / matrix モードの解決
  # ================================================================
  # すべての CI job は本 gate に `needs:` 依存する。gate が skip されると
  # 後続 job も skip される (`needs` の標準挙動)。これにより:
  #
  # - comment trigger のフィルタを 1 箇所に集約 (typo / 抜けを防ぐ)
  # - 将来 trigger を `pull_request:` に戻すときの差し替えが gate のみで済む
  # - 各 job の `if:` 条件は gate の output だけを参照するシンプルな形に保てる
  #
  # 許可条件:
  # - issue (= PR コメントを含む) ではなく PR コメントであること
  #   (`github.event.issue.pull_request` が truthy なら PR)
  # - body に `!run ci` が含まれること (matrix 指定もこのサブ文字列を含む)
  # - author が OWNER / MEMBER / COLLABORATOR のいずれか
  #   (fork からの外部 attacker による trigger を遮断)
  gate:
    name: gate (comment filter)
    if: >-
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '!run ci') &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-latest
    outputs:
      # PR HEAD の ref。後続 job の checkout で参照する。
      pr_ref: ${{ steps.resolve.outputs.pr_ref }}
      # `!run ci matrix` が指定されているなら 'true'、それ以外は 'false'。
      # test-linux / test-matrix の if: でこの値を判定する。
      run_matrix: ${{ steps.resolve.outputs.run_matrix }}
    steps:
      - id: resolve
        # comment body と PR 番号を env 経由で受け取り、run: 内では `${{ }}`
        # 展開を行わない (CLAUDE.md / workflow 冒頭の command injection 防止)。
        env:
          BODY: ${{ github.event.comment.body }}
          PR_NUM: ${{ github.event.issue.number }}
        run: |
          echo "pr_ref=refs/pull/${PR_NUM}/head" >> "$GITHUB_OUTPUT"
          if [[ "$BODY" == *"!run ci matrix"* ]]; then
            echo "run_matrix=true" >> "$GITHUB_OUTPUT"
            echo "Matrix mode requested (ubuntu + macos + windows)."
          else
            echo "run_matrix=false" >> "$GITHUB_OUTPUT"
            echo "Linux-only mode (default)."
          fi

  fmt:
    name: cargo fmt --check
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.gate.outputs.pr_ref }}
      - name: Show versions
        run: |
          rustup show active-toolchain
          cargo fmt --version
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy -D warnings
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.gate.outputs.pr_ref }}
      - name: Show versions
        run: |
          rustup show active-toolchain
          cargo clippy --version
      - name: Cache cargo registry and target
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-${{ runner.os }}-${{ github.job }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ github.job }}-
      - run: cargo clippy --workspace --all-targets -- -D warnings

  doc:
    name: cargo doc
    needs: gate
    runs-on: ubuntu-latest
    env:
      # SPEC.md の Lint / Doc 方針で `cargo doc --workspace --no-deps` が
      # `RUSTDOCFLAGS=-D warnings` で clean であることを CI 強制する。
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.gate.outputs.pr_ref }}
      - name: Show versions
        run: |
          rustup show active-toolchain
          cargo --version
      - name: Cache cargo registry and target
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-${{ runner.os }}-${{ github.job }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ github.job }}-
      - run: cargo doc --workspace --no-deps

  # ----------------------------------------------------------------
  # test-linux: `!run ci` (matrix 指定なし) のとき ubuntu-latest のみで実行
  # ----------------------------------------------------------------
  test-linux:
    name: cargo test (ubuntu-latest)
    needs: gate
    if: needs.gate.outputs.run_matrix == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.gate.outputs.pr_ref }}
      - name: Show versions
        run: |
          rustup show active-toolchain
          cargo --version
          rustc --version
      - name: Cache cargo registry and target
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-${{ runner.os }}-${{ github.job }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ github.job }}-
      - name: cargo build
        run: cargo build --workspace --all-targets
      - name: cargo test
        run: cargo test --workspace --all-targets
      - name: cargo test (doc)
        run: cargo test --workspace --doc

  # ----------------------------------------------------------------
  # test-matrix: `!run ci matrix` のときのみ ubuntu / macos / windows で実行
  # ----------------------------------------------------------------
  # propcheck-derive の手書き parser と block_on executor の挙動を
  # multi-platform 検証する。consumer 側で windows / macOS でも使われる
  # 前提のため、最終 merge 前にはこの 3 OS で test を緑にしておく。
  test-matrix:
    name: cargo test (${{ matrix.os }})
    needs: gate
    if: needs.gate.outputs.run_matrix == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.gate.outputs.pr_ref }}
      - name: Show versions
        run: |
          rustup show active-toolchain
          cargo --version
          rustc --version
      - name: Cache cargo registry and target
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-${{ runner.os }}-${{ github.job }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ github.job }}-
      - name: cargo build
        run: cargo build --workspace --all-targets
      - name: cargo test
        run: cargo test --workspace --all-targets
      - name: cargo test (doc)
        run: cargo test --workspace --doc

  msrv:
    name: MSRV (1.82) cargo test
    # SPEC.md の Toolchain pin 方針で MSRV = 1.82 (`PanicHookInfo` 由来) を
    # 宣言している。testrs は直接依存ゼロ (std + proc_macro のみ) であり
    # dev-dep も無いため、build/check ではなく `cargo test` まで MSRV で
    # 流して実挙動を検証する (最も厳格な MSRV 保証)。
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.gate.outputs.pr_ref }}
      - name: Install Rust 1.82
        run: |
          rustup toolchain install 1.82 --profile minimal --no-self-update
          rustup default 1.82
      - name: Show versions
        run: |
          rustup show active-toolchain
          cargo --version
          rustc --version
      - name: Cache cargo registry and target
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-${{ runner.os }}-${{ github.job }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ github.job }}-
      - run: cargo test --workspace --all-targets

  deny:
    name: cargo deny (license/bans/sources/advisories)
    # ================================================================
    # 本 job は **許容済 3rd party action `EmbarkStudios/cargo-deny-action@v2`**
    # を SHA pin で利用する。testrs の 3rd party action policy では、この
    # action の **1 個のみ** を SHA pin で許容し、それ以外の 3rd party
    # action は禁止する (本 workflow 冒頭の "3rd party action allowlist" 参照)。
    #
    # 設定本体は repo root の `deny.toml` を参照する (action のデフォルト挙動)。
    #
    # ## CVE check も本 job で行う
    #
    # 以前は separate `audit` job (`rustsec/audit-check@v2`) で CVE check を
    # 行い、deny 側からは advisories を意図的に除外していた。しかし
    # (1) audit-check は Cargo.lock を要求するため library workspace では
    # `cargo generate-lockfile` 経由で毎回 dependency resolve を走らせる
    # コストが課金面で無視できない、(2) cargo-audit 0.21.x が CVSS 4.0 形式
    # の advisory (RustSec advisory DB に 2026 年以降追加) を parse できず
    # CI が constantly fail する問題が報告されている、の 2 点から本 job に
    # 統合した。cargo-deny 0.19+ は rustsec を捨てて独自実装の advisory
    # parser に移行しており CVSS 4.0 を扱えるため、CVE check も `command:
    # check ... advisories` で本 action から実行できる。
    #
    # これにより:
    # - deny job 赤 → license 違反 / 禁止 crate 混入 / 不審な source / CVE
    #   検出 のいずれか。内訳は CI ログで識別する
    # - audit / deny の責務分離は失うが、cargo-audit の制約 (CVSS 4.0 parse
    #   不可) と library workspace 特有の lockfile resolve コストから解放される
    # ================================================================
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.gate.outputs.pr_ref }}
      # 許容 3rd party action #1 / 1: EmbarkStudios/cargo-deny-action
      # (本 workflow 冒頭の "3rd party action allowlist" 参照。allowlist 外の
      # 3rd party action を新規追加する場合は、冒頭コメントの手順に従うこと)
      #
      # 除外設定 (`ignore` 等) は repo root の `deny.toml` で集約管理する。
      # ローカルでも `cargo deny check all` を同じ設定で実行できるよう、
      # CI 側からは追加の CLI フラグを渡さない方針。
      - uses: EmbarkStudios/cargo-deny-action@091bd13faf7e96935df105635d17ce9a607bc99d # v2
        with:
          command: check licenses bans sources advisories

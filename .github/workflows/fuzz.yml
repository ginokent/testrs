name: Fuzz

# CI 標準 (`ci.yml`) の test ジョブは毎 PR で debug build / default iteration
# で回るが、propcheck 本体は PBT + in-process fuzzer (`propcheck-fuzz`) を
# 提供する性質上、自身もより長時間 / release ビルドで stochastic な regression
# を引きに行く価値が高い。本 workflow を ci.yml から分離し、release ビルドで
# workspace 全体の test を回す形にしている。
#
# crash を見つけた場合、propcheck の regression replay 機能で seed が次回以降
# の実行で自動的に再現されるが、CI runner はエフェメラルなので artifact 保全
# は行わない。再現が必要な場合は GitHub の job log に出力される
# `PROPCHECK_SEED` を手元で `cargo test` の env に渡して replay すること
# (詳細は propcheck README 参照)。
#
# action 使用方針は ci.yml と同一: 全 action は `action@<commit SHA> # <tag>`
# 形式で SHA pin する (tag re-pointing 経由の supply chain 攻撃阻止)。
#
# 3rd party action allowlist は `ci.yml` の冒頭コメントで定義した 2 つ
# (rustsec/audit-check, EmbarkStudios/cargo-deny-action) のみ許容する project
# policy に従う。本 workflow は現状 `actions/*` (GitHub 1st party) のみ使用し、
# 3rd party action は使用していない。新規 3rd party action を追加する場合は
# ci.yml の allowlist 更新手順に従うこと。
#
# 本 workflow は untrusted な GitHub Actions context 入力 (issue title /
# PR title / commit message 等) を一切 run: コマンドに展開しない。command
# injection 経路は無い。

on:
  schedule:
    # 毎週日曜 03:00 UTC (= JST 月曜 12:00)。週に 1 回の fuzz スイープ。
    - cron: "0 3 * * 0"
  workflow_dispatch: {}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fuzz:
    name: cargo test --release (PBT + fuzz harness)
    runs-on: ubuntu-latest
    # release ビルドで test 全体を回す (debug より速い + 実運用構成と
    # 一致した最適化レベルでの panic 検出ができる)。
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Show versions
        run: |
          rustup show active-toolchain
          cargo --version
          rustc --version
      - name: Cache cargo registry and target
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-${{ runner.os }}-${{ github.job }}-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ github.job }}-
      - name: cargo test --workspace --release --all-targets
        run: cargo test --workspace --release --all-targets
      - name: cargo test --workspace --release --doc
        run: cargo test --workspace --release --doc
